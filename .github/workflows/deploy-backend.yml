name: Deploy Backend (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev or prod)'
        required: true
        type: string
      prefix:
        description: 'Resource name prefix, e.g. accommodations-planner-dev'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      DEPLOY_AWS_REGION:
        required: true

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build and publish Lambda layer
        working-directory: backend
        run: |
          cd layer
          npm install --omit=dev
          cd ..
          mkdir -p layer-build/nodejs
          cp -r layer/node_modules layer-build/nodejs/
          cd layer-build && zip -r ../layer.zip nodejs && cd ..
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name ${{ inputs.prefix }}-deps \
            --zip-file fileb://layer.zip \
            --compatible-runtimes nodejs20.x \
            --query LayerVersionArn --output text)
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      - name: Verify Lambda functions exist
        run: |
          set -euo pipefail
          for fn in "${{ inputs.prefix }}-health" "${{ inputs.prefix }}-reservations" "${{ inputs.prefix }}-ai-chat" "${{ inputs.prefix }}-ai-rag"; do
            if ! aws lambda get-function --function-name "$fn" > /dev/null 2>&1; then
              ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
              echo "Lambda function '$fn' was not found in account $ACCOUNT_ID, region ${{ secrets.DEPLOY_AWS_REGION }}."
              echo "Run infrastructure deployment first for this environment before updating Lambda code."
              exit 1
            fi
          done

      - name: Deploy Lambda function code and attach layer
        working-directory: backend
        run: |
          set -euo pipefail

          wait_for_lambda_ready () {
            local fn="$1"
            echo "Waiting for Lambda '$fn' to be ready..."
            for i in {1..30}; do
              status=$(aws lambda get-function-configuration --function-name "$fn" --query 'LastUpdateStatus' --output text)
              state=$(aws lambda get-function-configuration --function-name "$fn" --query 'State' --output text)
              echo "  Attempt $i: State=$state LastUpdateStatus=$status"
              if [[ "$state" == "Active" && ( "$status" == "Successful" || "$status" == "None" ) ]]; then
                return 0
              fi
              sleep 10
            done
            echo "Lambda '$fn' did not become ready in time."
            return 1
          }

          cd dist && zip -r ../lambda.zip . && cd ..

          for fn in "${{ inputs.prefix }}-health" "${{ inputs.prefix }}-reservations" "${{ inputs.prefix }}-ai-chat" "${{ inputs.prefix }}-ai-rag"; do
            echo "=== Deploying $fn ==="

            wait_for_lambda_ready "$fn"

            echo "Updating function code..."
            aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file fileb://lambda.zip

            wait_for_lambda_ready "$fn"

            echo "Attaching layer..."
            aws lambda update-function-configuration \
              --function-name "$fn" \
              --layers "$LAYER_ARN"

            wait_for_lambda_ready "$fn"

            echo "=== $fn deployed successfully ==="
          done

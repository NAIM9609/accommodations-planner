name: Deploy Backend (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev or prod)'
        required: true
        type: string
      prefix:
        description: 'Resource name prefix, e.g. accommodations-planner-dev'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      DEPLOY_AWS_REGION:
        required: true

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build and publish Lambda layer
        working-directory: backend
        run: |
          cd layer
          npm install --omit=dev
          cd ..
          mkdir -p layer-build/nodejs
          cp -r layer/node_modules layer-build/nodejs/
          cd layer-build && zip -r ../layer.zip nodejs && cd ..
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name ${{ inputs.prefix }}-deps \
            --zip-file fileb://layer.zip \
            --compatible-runtimes nodejs20.x \
            --query LayerVersionArn --output text)
          echo "LAYER_ARN=$LAYER_ARN" >> $GITHUB_ENV

      - name: Verify Lambda functions exist
        run: |
          set -euo pipefail
          for fn in "${{ inputs.prefix }}-health" "${{ inputs.prefix }}-reservations"; do
            if ! aws lambda get-function --function-name "$fn" > /dev/null 2>&1; then
              ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
              echo "Lambda function '$fn' was not found in account $ACCOUNT_ID, region ${{ secrets.DEPLOY_AWS_REGION }}."
              echo "Run infrastructure deployment first for this environment before updating Lambda code."
              exit 1
            fi
          done

      - name: Deploy Lambda function code
        working-directory: backend
        run: |
          cd dist && zip -r ../lambda.zip . && cd ..
          aws lambda update-function-code \
            --function-name ${{ inputs.prefix }}-health \
            --zip-file fileb://lambda.zip
          aws lambda update-function-code \
            --function-name ${{ inputs.prefix }}-reservations \
            --zip-file fileb://lambda.zip

      - name: Attach layer to Lambda functions
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ inputs.prefix }}-health \
            --layers "$LAYER_ARN"
          aws lambda update-function-configuration \
            --function-name ${{ inputs.prefix }}-reservations \
            --layers "$LAYER_ARN"

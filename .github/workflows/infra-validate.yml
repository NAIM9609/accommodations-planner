name: Infra Validate

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra-validate.yml'
      - 'scripts/validate-terraform-precommit.sh'
      - '.github/scripts/**'
      - 'scripts/deploy-local.sh'
  pull_request:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra-validate.yml'
      - 'scripts/validate-terraform-precommit.sh'
      - '.github/scripts/**'
      - 'scripts/deploy-local.sh'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.1.0
        with:
          tflint_version: v0.53.0

      - name: Terraform pre-commit equivalent checks
        run: bash scripts/validate-terraform-precommit.sh

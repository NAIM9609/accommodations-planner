name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

permissions:
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy-prod' }}
        run: |
          echo "Confirmation text did not match. Aborting."
          exit 1

      - name: Enforce master branch for prod
        if: ${{ github.ref != 'refs/heads/master' }}
        run: |
          echo "Production deploys are allowed only from master. Current ref: ${{ github.ref }}"
          exit 1

  validate-deploy-secrets-prod:
    name: Validate Deploy Secrets (Prod)
    needs: [validate-input]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Missing required secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Missing required secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.AMPLIFY_GITHUB_TOKEN }}" ]; then
            echo "Missing required secret: AMPLIFY_GITHUB_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_AWS_REGION }}" ]; then
            echo "Missing required secret: DEPLOY_AWS_REGION"
            exit 1
          fi

  deploy-backend-prod:
    name: Deploy Backend to Prod
    needs: [validate-input, validate-deploy-secrets-prod, deploy-infra-prod]
    uses: ./.github/workflows/deploy-backend.yml
    with:
      environment: prod
      prefix: accommodations-planner-prod
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}

  deploy-infra-prod:
    name: Terraform Apply Prod
    needs: [validate-input, validate-deploy-secrets-prod]
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - run: terraform init
      - run: terraform workspace select prod || terraform workspace new prod
      - run: terraform plan -var-file="prod.tfvars" -var="environment=prod" -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}" -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
      - run: terraform apply -auto-approve -var-file="prod.tfvars" -var="environment=prod" -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}" -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"

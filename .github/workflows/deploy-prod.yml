name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy-prod' }}
        run: |
          echo "Confirmation text did not match. Aborting."
          exit 1

  deploy-backend-prod:
    name: Deploy Backend to Prod
    needs: validate-input
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Package and deploy Lambda
        working-directory: backend
        run: |
          cd dist
          cp -r ../node_modules .
          zip -r ../lambda.zip . node_modules
          cd ..
          aws lambda update-function-code \
            --function-name accommodations-planner-prod-health \
            --zip-file fileb://lambda.zip
          aws lambda update-function-code \
            --function-name accommodations-planner-prod-reservations \
            --zip-file fileb://lambda.zip

  deploy-infra-prod:
    name: Terraform Apply Prod
    needs: validate-input
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - run: terraform init
      - run: terraform workspace select prod || terraform workspace new prod
      - run: terraform plan -var="environment=prod" -var="aws_region=${{ vars.AWS_REGION || 'us-east-1' }}"
      - run: terraform apply -auto-approve -var="environment=prod" -var="aws_region=${{ vars.AWS_REGION || 'us-east-1' }}"

name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event.inputs.confirm != 'deploy-prod' }}
        run: |
          echo "Confirmation text did not match. Aborting."
          exit 1

  deploy-backend-prod:
    name: Deploy Backend to Prod
    needs: validate-input
    uses: ./.github/workflows/deploy-backend.yml
    with:
      environment: prod
      prefix: accommodations-planner-prod
      aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-infra-prod:
    name: Terraform Apply Prod
    needs: validate-input
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - run: terraform init
      - run: terraform workspace select prod || terraform workspace new prod
      - run: terraform plan -var="environment=prod" -var="aws_region=${{ vars.AWS_REGION || 'us-east-1' }}"
      - run: terraform apply -auto-approve -var="environment=prod" -var="aws_region=${{ vars.AWS_REGION || 'us-east-1' }}"

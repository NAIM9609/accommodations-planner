name: Infra LocalStack Test

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infra-localstack-test.yml'
      - '.github/scripts/localstack-providers-override.tf'
      - '.github/scripts/localstack-backend-override.tf'
      - '.github/scripts/localstack-post-apply-smoke.sh'

permissions:
  contents: read

jobs:
  localstack-terraform-test:
    name: Terraform LocalStack Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Start LocalStack (Community Edition) with all services enabled.
      # Port mapping matches docker-compose.yml: host 14566 → container 4566.
      # A built-in Docker healthcheck is attached so the wait step can also
      # consult Docker's own health status in addition to the HTTP poll.
      - name: Start LocalStack
        run: |
          docker run -d --name localstack \
            -p 14566:4566 \
            -e DEBUG=0 \
            --health-cmd="curl -fsS http://localhost:4566/_localstack/health || exit 1" \
            --health-interval=5s \
            --health-timeout=2s \
            --health-retries=30 \
            localstack/localstack:3.8.0

      - name: Wait for LocalStack to be healthy
        run: |
          set -euo pipefail

          echo "Waiting for LocalStack container to be running..."
          container_running=false
          for i in {1..30}; do
            status="$(docker inspect -f '{{.State.Status}}' localstack 2>/dev/null || true)"
            if [ "$status" = "running" ]; then
              container_running=true
              break
            fi
            sleep 2
          done
          if [ "$container_running" = "false" ]; then
            echo "LocalStack container did not reach 'running' state. Current state:"
            docker ps -a
            docker logs --tail=100 localstack || true
            exit 1
          fi

          echo "Waiting for LocalStack health endpoint..."
          for i in {1..40}; do
            if curl --silent --show-error --fail \
              http://localhost:14566/_localstack/health > /dev/null; then
              echo "LocalStack is healthy."
              exit 0
            fi
            sleep 3
          done

          echo "LocalStack did not become healthy in time. Dumping logs:"
          docker ps -a
          docker logs --tail=300 localstack || true
          exit 1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      # Copy the provider and backend override files into the infrastructure
      # working directory.  Both files end in _override.tf so Terraform treats
      # them as overrides and merges them with the existing configuration:
      #   localstack_override.tf         – redirects AWS calls to LocalStack
      #   localstack_backend_override.tf – replaces the S3 backend with a local
      #                                    one so no real S3 bucket is required
      - name: Inject LocalStack provider and backend overrides
        run: |
          cp ../.github/scripts/localstack-providers-override.tf localstack_override.tf
          cp ../.github/scripts/localstack-backend-override.tf localstack_backend_override.tf

      # Use -reconfigure so Terraform re-initialises with the local backend
      # supplied by localstack_backend_override.tf instead of the S3 backend
      # declared in backend.tf.  Without this, terraform plan would detect the
      # un-initialised S3 backend and abort with "Backend initialization required".
      - name: Terraform init (local backend)
        run: terraform init -reconfigure -input=false

      - name: Terraform validate
        run: terraform validate

      # Plan only the core modules supported by LocalStack Community Edition.
      # Amplify is excluded with -target because it is not available locally.
      # data.aws_caller_identity and the OIDC data source are only referenced
      # by root-level resources that are also excluded, so they are not evaluated.
      - name: Terraform plan (LocalStack)
        run: |
          terraform plan \
            -var-file=localstack.tfvars \
            -target=module.dynamodb \
            -target=module.lambda \
            -target=module.api_gateway \
            -out=localstack.tfplan \
            -input=false

      - name: Terraform apply (LocalStack)
        run: terraform apply -auto-approve localstack.tfplan

      - name: Run post-apply smoke tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          LOCALSTACK_ENDPOINT: http://localhost:14566
        run: bash ../.github/scripts/localstack-post-apply-smoke.sh accommodations-planner-dev

      # Destroy in a separate step that always runs so the LocalStack container
      # is not left with stale state between workflow retries.
      - name: Terraform destroy (cleanup)
        if: always()
        run: |
          terraform destroy \
            -auto-approve \
            -var-file=localstack.tfvars \
            -target=module.dynamodb \
            -target=module.lambda \
            -target=module.api_gateway \
            -input=false || true

      - name: Remove LocalStack overrides
        if: always()
        run: rm -f localstack_override.tf localstack_backend_override.tf localstack.tfplan terraform.tfstate terraform.tfstate.backup

      - name: Stop LocalStack
        if: always()
        run: docker stop localstack || true

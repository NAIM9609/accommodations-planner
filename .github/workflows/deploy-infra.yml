name: Deploy Infra (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment (dev or prod)
        required: true
        type: string
      prefix:
        description: Resource prefix, e.g. accommodations-planner-dev
        required: true
        type: string
      backend_key:
        description: Backend state key suffix under accommodations-planner/
        required: true
        type: string
      tfvars_file:
        description: Optional tfvars filename in infrastructure directory
        required: false
        type: string
        default: ''
      import_existing_resources:
        description: Run import script so existing AWS resources are tracked in state (avoids duplicate creates).
        required: false
        type: boolean
        default: true
      delete_and_recreate:
        description: >-
          If true, every resource found in module.lambda, module.api_gateway, and module.amplify is force-replaced
          (destroyed then recreated) by querying 'terraform state list' and passing a -replace=<addr> flag for
          each matching resource. DynamoDB is never affected. Use only when you intend to tear down and recreate
          those stacks. Requires manual workflow_dispatch; ignored on push.
        required: false
        type: boolean
        default: false
      import_lock_timeout:
        description: Terraform -lock-timeout for each import (shorter = fail fast if state is locked elsewhere).
        required: false
        type: string
        default: '45s'
      plan_apply_lock_timeout:
        description: Terraform -lock-timeout for plan and apply.
        required: false
        type: string
        default: '2m'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      DEPLOY_AWS_REGION:
        required: true
      AMPLIFY_GITHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy-infra:
    name: Terraform Plan/Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=accommodations-planner-tf-state" \
            -backend-config="key=accommodations-planner/${{ inputs.backend_key }}" \
            -backend-config="region=${{ secrets.DEPLOY_AWS_REGION }}" \
            -backend-config="dynamodb_table=accommodations-planner-tf-lock" \
            -backend-config="encrypt=true"

      - name: Select workspace
        run: terraform workspace select -or-create ${{ inputs.environment }}

      - name: Import existing resources into state
        if: ${{ inputs.import_existing_resources }}
        env:
          TF_INPUT: "0"
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region: ${{ secrets.DEPLOY_AWS_REGION }}
          TF_VAR_amplify_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
        run: bash ../.github/scripts/terraform-import-existing.sh "${{ inputs.prefix }}" "${{ secrets.DEPLOY_AWS_REGION }}" "${{ inputs.import_lock_timeout }}"

      - name: Build force-replace targets
        if: ${{ inputs.delete_and_recreate == true }}
        run: |
          set -euo pipefail
          # terraform -replace requires individual resource instance addresses, not module paths.
          # Query the current state to collect every address under the three target modules.
          # Auth/backend errors from terraform state list propagate via set -e + pipefail.
          # grep exit-1 (no matching lines) is suppressed intentionally – empty state is valid.
          terraform state list \
            | grep -E '^module\.(lambda|api_gateway|amplify)\.' \
            > /tmp/replace_targets.txt || true
          echo "Resources to force-replace:"
          if [ -s /tmp/replace_targets.txt ]; then
            cat /tmp/replace_targets.txt
          else
            echo "(none found in state – resources will be created fresh)"
          fi

      - name: Terraform plan
        run: |
          set -euo pipefail
          TF_ARGS=(
            -lock-timeout=${{ inputs.plan_apply_lock_timeout }}
            -var="environment=${{ inputs.environment }}"
            -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}"
            -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
          )
          [ -n "${{ inputs.tfvars_file }}" ] && TF_ARGS+=("-var-file=${{ inputs.tfvars_file }}")
          if [ -s /tmp/replace_targets.txt ]; then
            while IFS= read -r addr; do
              TF_ARGS+=("-replace=${addr}")
            done < /tmp/replace_targets.txt
          fi
          terraform plan "${TF_ARGS[@]}"

      - name: Terraform apply
        run: |
          set -euo pipefail
          TF_ARGS=(
            -auto-approve
            -lock-timeout=${{ inputs.plan_apply_lock_timeout }}
            -var="environment=${{ inputs.environment }}"
            -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}"
            -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
          )
          [ -n "${{ inputs.tfvars_file }}" ] && TF_ARGS+=("-var-file=${{ inputs.tfvars_file }}")
          if [ -s /tmp/replace_targets.txt ]; then
            while IFS= read -r addr; do
              TF_ARGS+=("-replace=${addr}")
            done < /tmp/replace_targets.txt
          fi
          terraform apply "${TF_ARGS[@]}"

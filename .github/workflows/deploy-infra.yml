name: Deploy Infra (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment (dev or prod)
        required: true
        type: string
      prefix:
        description: Resource prefix, e.g. accommodations-planner-dev
        required: true
        type: string
      backend_key:
        description: Backend state key suffix under accommodations-planner/
        required: true
        type: string
      tfvars_file:
        description: Optional tfvars filename in infrastructure directory
        required: false
        type: string
        default: ''
      import_existing_resources:
        description: Run import script so existing AWS resources are tracked in state (avoids duplicate creates).
        required: false
        type: boolean
        default: true
      delete_and_recreate:
        description: >-
          If true, every resource found in module.lambda, module.api_gateway, and module.amplify is force-replaced
          (destroyed then recreated) by querying 'terraform state list' and passing a -replace=<addr> flag for
          each matching resource. DynamoDB is never affected. Use only when you intend to tear down and recreate
          those stacks. Requires manual workflow_dispatch; ignored on push.
        required: false
        type: boolean
        default: false
      targeted_modules:
        description: >-
          Space-separated list of Terraform module targets for a targeted apply
          (e.g. "module.dynamodb module.lambda"). When non-empty, only the
          listed modules are included in the plan and apply. Leave empty for a
          full plan/apply.
        required: false
        type: string
        default: ''
      import_lock_timeout:
        description: Terraform -lock-timeout for each import (shorter = fail fast if state is locked elsewhere).
        required: false
        type: string
        default: '5m'
      plan_apply_lock_timeout:
        description: Terraform -lock-timeout for plan and apply.
        required: false
        type: string
        default: '5m'
      lockfile_wait_timeout_seconds:
        description: Max seconds to wait for an existing S3 Terraform lockfile to clear before running imports/plan.
        required: false
        type: string
        default: '900'
      lockfile_wait_poll_seconds:
        description: Poll interval in seconds while waiting for the S3 Terraform lockfile to clear.
        required: false
        type: string
        default: '15'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      DEPLOY_AWS_REGION:
        required: true
      AMPLIFY_GITHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy-infra:
    name: Terraform Plan/Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - name: Verify S3 backend is configured
        run: |
          set -euo pipefail
          if ! grep -q 'backend "s3"' backend.tf; then
            echo "Terraform backend must be S3 for shared remote state."
            exit 1
          fi

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.1.0
        with:
          tflint_version: v0.53.0

      - name: Terraform preflight checks
        run: bash ../scripts/validate-terraform-precommit.sh

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=accommodations-planner-tf-state" \
            -backend-config="key=accommodations-planner/${{ inputs.backend_key }}" \
            -backend-config="region=${{ secrets.DEPLOY_AWS_REGION }}" \
            -backend-config="dynamodb_table=accommodations-planner-tf-lock" \
            -backend-config="encrypt=true"

      - name: Select workspace
        run: terraform workspace select -or-create ${{ inputs.environment }}

      - name: Wait for Terraform S3 lockfile to clear
        run: |
          set -euo pipefail
          BUCKET="accommodations-planner-tf-state"
          STATE_KEY="env:/${{ inputs.environment }}/accommodations-planner/${{ inputs.backend_key }}"
          LOCK_KEY="${STATE_KEY}.tflock"
          TIMEOUT_SECONDS="${{ inputs.lockfile_wait_timeout_seconds }}"
          POLL_SECONDS="${{ inputs.lockfile_wait_poll_seconds }}"
          ELAPSED=0

          echo "Checking S3 lockfile: s3://${BUCKET}/${LOCK_KEY}"
          while aws s3api head-object --bucket "$BUCKET" --key "$LOCK_KEY" >/dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
              echo "Timed out after ${TIMEOUT_SECONDS}s waiting for Terraform lockfile to clear."
              exit 1
            fi
            echo "Terraform lockfile still present. Waiting ${POLL_SECONDS}s... (${ELAPSED}/${TIMEOUT_SECONDS}s)"
            sleep "$POLL_SECONDS"
            ELAPSED=$((ELAPSED + POLL_SECONDS))
          done
          echo "No active Terraform lockfile found. Proceeding."

      - name: Import existing resources into state
        if: ${{ inputs.import_existing_resources }}
        env:
          TF_INPUT: "0"
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_aws_region: ${{ secrets.DEPLOY_AWS_REGION }}
          TF_VAR_amplify_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_FORCE_UNLOCK_MIN_AGE_SECONDS: "1800"
          TF_LOCK_RETRY_ATTEMPTS: "5"
          TF_LOCK_RETRY_DELAY_SECONDS: "30"
        run: bash ../.github/scripts/terraform-import-existing.sh "${{ inputs.prefix }}" "${{ secrets.DEPLOY_AWS_REGION }}" "${{ inputs.import_lock_timeout }}"

      - name: Build force-replace targets
        if: ${{ inputs.delete_and_recreate == true }}
        run: |
          set -euo pipefail
          # terraform -replace requires individual resource instance addresses, not module paths.
          # Query the current state to collect every address under the three target modules.
          # Auth/backend errors from terraform state list propagate via set -e + pipefail.
          # grep exit-1 (no matching lines) is suppressed intentionally – empty state is valid.
          terraform state list \
            | grep -E '^module\.(lambda|api_gateway|amplify)\.' \
            > /tmp/replace_targets.txt || true
          echo "Resources to force-replace:"
          if [ -s /tmp/replace_targets.txt ]; then
            cat /tmp/replace_targets.txt
          else
            echo "(none found in state – resources will be created fresh)"
          fi

      # Back up the current remote state before touching it.
      # The backup key is timestamped so each run is independently recoverable.
      - name: Back up S3 Terraform state
        run: |
          TIMESTAMP="$(date -u '+%Y-%m-%dT%H-%M-%SZ')"
          SOURCE_KEY="accommodations-planner/${{ inputs.backend_key }}"
          BACKUP_KEY="accommodations-planner/backups/${TIMESTAMP}-${{ inputs.backend_key }}"
          BUCKET="accommodations-planner-tf-state"
          if aws s3api head-object \
               --bucket "$BUCKET" \
               --key   "$SOURCE_KEY" > /dev/null 2>&1; then
            aws s3 cp \
              "s3://${BUCKET}/${SOURCE_KEY}" \
              "s3://${BUCKET}/${BACKUP_KEY}"
            echo "State backed up to s3://${BUCKET}/${BACKUP_KEY}"
          else
            echo "No existing state object found at ${SOURCE_KEY} – skipping backup."
          fi

      # Plan and capture the detailed exit code:
      #   0 = no changes  → skip apply (nothing to do)
      #   1 = plan error  → fail immediately
      #   2 = changes pending → proceed to apply
      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          TF_ARGS=(
            -detailed-exitcode
            -out=tfplan
            -lock-timeout=${{ inputs.plan_apply_lock_timeout }}
            -var="environment=${{ inputs.environment }}"
            -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}"
            -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
          )
          [ -n "${{ inputs.tfvars_file }}" ] && TF_ARGS+=("-var-file=${{ inputs.tfvars_file }}")
          if [ -s /tmp/replace_targets.txt ]; then
            while IFS= read -r addr; do
              TF_ARGS+=("-replace=${addr}")
            done < /tmp/replace_targets.txt
          fi
          if [ -n "${{ inputs.targeted_modules }}" ]; then
            for mod in ${{ inputs.targeted_modules }}; do
              TF_ARGS+=("-target=${mod}")
            done
          fi
          set +e
          terraform plan "${TF_ARGS[@]}"
          PLAN_EXIT=$?
          set -e
          if [[ ! "$PLAN_EXIT" =~ ^[0-2]$ ]]; then
            echo "Unexpected terraform plan exit code: ${PLAN_EXIT} (expected 0, 1, or 2)"
            exit 1
          fi
          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "Terraform plan failed with an error."
            exit 1
          fi
          echo "plan_exit=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "No infrastructure changes detected. Skipping apply."
          else
            echo "Changes detected. Apply will proceed."
          fi

      - name: Terraform apply
        if: ${{ steps.plan.outputs.plan_exit == '2' }}
        run: |
          set -euo pipefail
          terraform apply -auto-approve tfplan

      # Validate key outputs exist and are non-empty after apply.
      # Outputs checked: api_url (module.api_gateway), dynamodb_table_name (module.dynamodb).
      # Update this list if root outputs.tf is changed.
      - name: Validate Terraform outputs
        if: ${{ steps.plan.outputs.plan_exit == '2' }}
        run: |
          set -euo pipefail
          check_output() {
            local name="$1"
            local value
            value="$(terraform output -raw "${name}" 2>/dev/null || true)"
            if [ -z "${value}" ]; then
              echo "ERROR: Terraform output '${name}' is empty or missing."
              exit 1
            fi
            echo "Output '${name}' = ${value}"
          }
          check_output "api_url"
          check_output "dynamodb_table_name"

      - name: Clean up plan file
        if: always()
        run: rm -f tfplan

name: Deploy Infra (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment (dev or prod)
        required: true
        type: string
      backend_key:
        description: S3 state key under accommodations-planner/ (e.g. dev.tfstate)
        required: true
        type: string
      tfvars_file:
        description: Optional tfvars filename in the infrastructure directory (e.g. prod.tfvars)
        required: false
        type: string
        default: ''
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      DEPLOY_AWS_REGION:
        required: true
      AMPLIFY_GITHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy-infra:
    name: Terraform Plan/Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: terraform-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      TF_IN_AUTOMATION: "true"
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'
          terraform_wrapper: false

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.1.0
        with:
          tflint_version: v0.53.0

      - name: Terraform preflight checks
        run: bash ../scripts/validate-terraform-precommit.sh

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=accommodations-planner-tf-state" \
            -backend-config="key=accommodations-planner/${{ inputs.backend_key }}" \
            -backend-config="region=${{ secrets.DEPLOY_AWS_REGION }}" \
            -backend-config="dynamodb_table=accommodations-planner-tf-lock" \
            -backend-config="encrypt=true"

      - name: Select Terraform workspace
        run: terraform workspace select -or-create ${{ inputs.environment }}

      - name: Back up Terraform state
        run: |
          TIMESTAMP="$(date -u '+%Y-%m-%dT%H-%M-%SZ')"
          SOURCE_KEY="accommodations-planner/${{ inputs.backend_key }}"
          BACKUP_KEY="accommodations-planner/backups/${TIMESTAMP}-${{ inputs.backend_key }}"
          BUCKET="accommodations-planner-tf-state"
          if aws s3api head-object --bucket "$BUCKET" --key "$SOURCE_KEY" > /dev/null 2>&1; then
            aws s3 cp "s3://${BUCKET}/${SOURCE_KEY}" "s3://${BUCKET}/${BACKUP_KEY}"
            echo "State backed up to s3://${BUCKET}/${BACKUP_KEY}"
          else
            echo "No existing state at ${SOURCE_KEY} – skipping backup."
          fi

      # Exit codes: 0 = no changes (skip apply), 1 = error, 2 = changes pending (run apply)
      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          TF_ARGS=(
            -detailed-exitcode
            -out=tfplan
            -var="environment=${{ inputs.environment }}"
            -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}"
            -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
          )
          [ -n "${{ inputs.tfvars_file }}" ] && TF_ARGS+=("-var-file=${{ inputs.tfvars_file }}")
          set +e
          terraform plan "${TF_ARGS[@]}"
          PLAN_EXIT=$?
          set -e
          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi
          echo "plan_exit=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "No changes detected – skipping apply."
          else
            echo "Changes detected – apply will run."
          fi

      - name: Terraform apply
        if: ${{ steps.plan.outputs.plan_exit == '2' }}
        run: terraform apply -auto-approve tfplan

      # Validate that key outputs are non-empty after a successful apply.
      - name: Validate Terraform outputs
        if: ${{ steps.plan.outputs.plan_exit == '2' }}
        run: |
          set -euo pipefail
          check_output() {
            local name="$1"
            local value
            value="$(terraform output -raw "${name}" 2>/dev/null || true)"
            if [ -z "${value}" ]; then
              echo "ERROR: Terraform output '${name}' is empty or missing."
              exit 1
            fi
            echo "Output '${name}' = ${value}"
          }
          check_output "api_url"
          check_output "dynamodb_table_name"

      - name: Clean up plan file
        if: always()
        run: rm -f tfplan

name: Deploy Prod Infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
      force_replace_resources:
        description: >-
          Space- or newline-separated Terraform resource addresses to force-replace
          (destroy and recreate) during this deploy. High impact; use only when intentional.
        type: string
        default: ''
      targeted_modules:
        description: >-
          Space-separated Terraform module targets for a partial apply
          (e.g. "module.dynamodb module.lambda"). Leave empty for a full apply.
        type: string
        default: ''
      auto_force_unlock_stale_lock:
        description: >-
          If true, allows guarded auto force-unlock only for stale Terraform locks.
          High impact; use only with operational approval.
        type: boolean
        default: false
      auto_force_unlock_ack:
        description: >-
          Required acknowledgement phrase if auto_force_unlock_stale_lock=true:
          I_UNDERSTAND_FORCE_UNLOCK_RISK
        type: string
        default: ''
      stale_lock_min_age_seconds:
        description: Minimum lock age in seconds required before guarded auto force-unlock.
        type: string
        default: '3600'

concurrency:
  group: deploy-prod-infra
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'deploy-prod' }}
        run: |
          echo "Confirmation text did not match. Aborting."
          exit 1

  validate-deploy-secrets-prod:
    name: Validate Deploy Secrets (Prod)
    needs: [validate-input]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Missing required secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Missing required secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.AMPLIFY_GITHUB_TOKEN }}" ]; then
            echo "Missing required secret: AMPLIFY_GITHUB_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_AWS_REGION }}" ]; then
            echo "Missing required secret: DEPLOY_AWS_REGION"
            exit 1
          fi

  deploy-infra-prod:
    name: Deploy Infra to Prod
    needs: [validate-deploy-secrets-prod]
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: prod
      backend_key: prod.tfstate
      tfvars_file: prod.tfvars
      force_replace_resources: ${{ github.event.inputs.force_replace_resources || '' }}
      targeted_modules: ${{ github.event.inputs.targeted_modules || '' }}
      auto_force_unlock_stale_lock: ${{ github.event.inputs.auto_force_unlock_stale_lock == 'true' }}
      auto_force_unlock_ack: ${{ github.event.inputs.auto_force_unlock_ack || '' }}
      stale_lock_min_age_seconds: ${{ github.event.inputs.stale_lock_min_age_seconds || '3600' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

name: Deploy Prod Infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
      deploy_dynamodb:
        description: Deploy DynamoDB stack
        required: false
        type: boolean
        default: true
      deploy_lambda:
        description: Deploy Lambda stack
        required: false
        type: boolean
        default: true
      deploy_api_gateway:
        description: Deploy API Gateway stack
        required: false
        type: boolean
        default: true
      deploy_amplify:
        description: Deploy Amplify stack
        required: false
        type: boolean
        default: true
      deploy_iam:
        description: Deploy IAM stack
        required: false
        type: boolean
        default: true
      deploy_cognito:
        description: Deploy Cognito stack
        required: false
        type: boolean
        default: true
      cleanup_orphaned_resources:
        description: Run orphaned resource cleanup before deploy
        required: false
        type: boolean
        default: true
      remove_orphaned_dynamodb:
        description: Allow cleanup to delete orphaned DynamoDB table when DynamoDB deploy is disabled (DATA LOSS)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-prod-infra
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "Confirmation text did not match 'deploy-prod'. Aborting."
            exit 1
          fi

  deploy-infra:
    name: Deploy Infra to Prod
    needs: [validate-confirmation]
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: prod
      params_file: params/prod.json
      cleanup_orphaned_resources: ${{ github.event.inputs.cleanup_orphaned_resources == 'true' }}
      remove_orphaned_dynamodb: ${{ github.event.inputs.cleanup_orphaned_resources == 'true' && github.event.inputs.deploy_dynamodb != 'true' && github.event.inputs.remove_orphaned_dynamodb == 'true' }}
      enable_dynamodb: ${{ github.event.inputs.deploy_dynamodb == 'true' }}
      enable_lambda: ${{ github.event.inputs.deploy_lambda == 'true' }}
      enable_api_gateway: ${{ github.event.inputs.deploy_api_gateway == 'true' }}
      enable_amplify: ${{ github.event.inputs.deploy_amplify == 'true' }}
      enable_iam: ${{ github.event.inputs.deploy_iam == 'true' }}
      enable_cognito: ${{ github.event.inputs.deploy_cognito == 'true' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

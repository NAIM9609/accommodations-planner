name: Deploy Prod Infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true

concurrency:
  group: deploy-prod-infra
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-input:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'deploy-prod' }}
        run: |
          echo "Confirmation text did not match. Aborting."
          exit 1

  validate-deploy-secrets-prod:
    name: Validate Deploy Secrets (Prod)
    needs: [validate-input]
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Missing required secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Missing required secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.AMPLIFY_GITHUB_TOKEN }}" ]; then
            echo "Missing required secret: AMPLIFY_GITHUB_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_AWS_REGION }}" ]; then
            echo "Missing required secret: DEPLOY_AWS_REGION"
            exit 1
          fi

  deploy-infra-prod:
    name: Terraform Apply Prod
    needs: [validate-deploy-secrets-prod]
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEPLOY_AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.5'

      - run: |
          terraform init \
            -backend-config="bucket=accommodations-planner-tf-state" \
            -backend-config="key=accommodations-planner/prod.tfstate" \
            -backend-config="region=${{ secrets.DEPLOY_AWS_REGION }}" \
            -backend-config="dynamodb_table=accommodations-planner-tf-lock" \
            -backend-config="encrypt=true"
      - run: terraform workspace select prod || terraform workspace new prod
      - name: Import existing resources into state (prod)
        run: |
          set -euo pipefail

          PREFIX="accommodations-planner-prod"
          REGION="${{ secrets.DEPLOY_AWS_REGION }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          import_if_missing () {
            local addr="$1"
            local id="$2"
            if terraform state show "$addr" > /dev/null 2>&1; then
              echo "Already in state: $addr"
              return 0
            fi
            echo "Importing $addr <= $id"
            terraform import "$addr" "$id"
          }

          import_if_missing aws_iam_role.github_actions "${PREFIX}-github-actions" || true
          import_if_missing aws_iam_role_policy.github_actions "${PREFIX}-github-actions:${PREFIX}-github-actions-policy" || true
          import_if_missing module.dynamodb.aws_dynamodb_table.reservations "${PREFIX}-reservations" || true
          import_if_missing module.lambda.aws_iam_role.lambda "${PREFIX}-lambda-role" || true
          import_if_missing module.lambda.aws_iam_role_policy.lambda_dynamodb "${PREFIX}-lambda-role:${PREFIX}-lambda-dynamodb" || true
          import_if_missing module.lambda.aws_iam_role_policy_attachment.lambda_basic "${PREFIX}-lambda-role/arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole" || true
          import_if_missing 'module.lambda.aws_cloudwatch_log_group.lambda["health"]' "/aws/lambda/${PREFIX}-health" || true
          import_if_missing 'module.lambda.aws_cloudwatch_log_group.lambda["reservations"]' "/aws/lambda/${PREFIX}-reservations" || true
          import_if_missing module.lambda.aws_lambda_function.health "${PREFIX}-health" || true
          import_if_missing module.lambda.aws_lambda_function.reservations "${PREFIX}-reservations" || true

          LAYER_ARN=$(aws lambda list-layer-versions \
            --layer-name "${PREFIX}-deps" \
            --query 'LayerVersions[0].LayerVersionArn' \
            --output text 2>/dev/null || true)
          if [ -n "${LAYER_ARN:-}" ] && [ "$LAYER_ARN" != "None" ]; then
            import_if_missing module.lambda.aws_lambda_layer_version.deps "$LAYER_ARN" || true
          fi
      - run: terraform plan -var-file="prod.tfvars" -var="environment=prod" -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}" -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"
      - run: terraform apply -auto-approve -var-file="prod.tfvars" -var="environment=prod" -var="aws_region=${{ secrets.DEPLOY_AWS_REGION }}" -var="amplify_github_token=${{ secrets.AMPLIFY_GITHUB_TOKEN }}"

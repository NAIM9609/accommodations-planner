name: Deploy Prod Infra

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
      stacks:
        description: "Which stacks to deploy (disabling a stack DELETES it)"
        required: false
        type: choice
        default: all
        options:
          - all
          - core
          - no-amplify
          - no-iam
          - iam-only
      skip_cleanup:
        description: Skip automatic orphaned resource cleanup
        required: false
        type: boolean
        default: false
      force_cleanup_dynamo:
        description: Also delete orphaned DynamoDB table (DATA LOSS)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-prod-infra
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "Confirmation text did not match 'deploy-prod'. Aborting."
            exit 1
          fi

  deploy-infra:
    name: Deploy Infra to Prod
    needs: [validate-confirmation]
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: prod
      params_file: params/prod.json
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
      force_cleanup_dynamo: ${{ github.event.inputs.force_cleanup_dynamo == 'true' }}
      enable_dynamodb: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_lambda: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_api_gateway: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_amplify: ${{ github.event.inputs.stacks == 'all' || github.event.inputs.stacks == '' || github.event.inputs.stacks == 'no-iam' }}
      enable_iam: ${{ github.event.inputs.stacks != 'core' && github.event.inputs.stacks != 'no-iam' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

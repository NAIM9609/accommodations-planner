name: Deploy Dev Infra

on:
  workflow_dispatch:
    inputs:
      stacks:
        description: "Which stacks to deploy (disabling a stack DELETES it)"
        required: false
        type: choice
        default: all
        options:
          - all
          - core
          - no-amplify
          - no-iam
          - iam-only
      skip_cleanup:
        description: Skip automatic orphaned resource cleanup
        required: false
        type: boolean
        default: false
      force_cleanup_dynamo:
        description: Also delete orphaned DynamoDB table (DATA LOSS)
        required: false
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-dev-infra.yml'
      - '.github/workflows/deploy-infra.yml'

concurrency:
  group: deploy-dev-infra
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-infra:
    name: Deploy Infra to Dev
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: dev
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
      force_cleanup_dynamo: ${{ github.event.inputs.force_cleanup_dynamo == 'true' }}
      enable_dynamodb: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_lambda: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_api_gateway: ${{ github.event.inputs.stacks != 'iam-only' }}
      enable_amplify: ${{ github.event.inputs.stacks == 'all' || github.event.inputs.stacks == '' || github.event.inputs.stacks == 'no-iam' }}
      enable_iam: ${{ github.event.inputs.stacks != 'core' && github.event.inputs.stacks != 'no-iam' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

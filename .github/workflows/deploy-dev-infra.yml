name: Deploy Dev Infra

on:
  workflow_dispatch:
    inputs:
      delete_and_recreate:
        description: >-
          If true, plan/apply replace module.lambda, module.api_gateway, and module.amplify (not DynamoDB). Use only when you intend to recreate those stacks.
        type: boolean
        default: false
      import_existing_resources:
        description: Run the import script before plan (recommended when resources may already exist in AWS).
        type: boolean
        default: true
      targeted_modules:
        description: >-
          Space-separated Terraform module targets for a partial apply
          (e.g. "module.dynamodb module.lambda"). Leave empty for a full apply.
        type: string
        default: ''
  push:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-dev-infra.yml'
      - '.github/workflows/deploy-infra.yml'
      - '.github/scripts/terraform-import-existing.sh'

concurrency:
  group: deploy-dev-infra
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-deploy-secrets-dev:
    name: Validate Deploy Secrets (Dev)
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required secrets are present
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Missing required secret: AWS_ACCESS_KEY_ID"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "Missing required secret: AWS_SECRET_ACCESS_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.AMPLIFY_GITHUB_TOKEN }}" ]; then
            echo "Missing required secret: AMPLIFY_GITHUB_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_AWS_REGION }}" ]; then
            echo "Missing required secret: DEPLOY_AWS_REGION"
            exit 1
          fi

  deploy-infra-dev:
    name: Deploy Infra to Dev
    needs: [validate-deploy-secrets-dev]
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: dev
      prefix: accommodations-planner-dev
      backend_key: dev.tfstate
      tfvars_file: ''
      delete_and_recreate: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.delete_and_recreate == 'true' }}
      import_existing_resources: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.import_existing_resources != 'false' }}
      targeted_modules: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.targeted_modules || '' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

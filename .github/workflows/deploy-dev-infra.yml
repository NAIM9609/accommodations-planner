name: Deploy Dev Infra

on:
  workflow_dispatch:
    inputs:
      github_branch:
        description: GitHub branch to build from
        required: true
        type: string
        default: master
      deploy_dynamodb:
        description: Deploy DynamoDB stack
        required: false
        type: boolean
        default: true
      deploy_lambda:
        description: Deploy Lambda stack
        required: false
        type: boolean
        default: true
      deploy_api_gateway:
        description: Deploy API Gateway stack
        required: false
        type: boolean
        default: true
      deploy_amplify:
        description: Deploy Amplify stack
        required: false
        type: boolean
        default: true
      deploy_iam:
        description: Deploy IAM stack
        required: false
        type: boolean
        default: true
      deploy_cognito:
        description: Deploy Cognito stack
        required: false
        type: boolean
        default: true
      cleanup_orphaned_resources:
        description: Run orphaned resource cleanup before deploy
        required: false
        type: boolean
        default: true
      remove_orphaned_dynamodb:
        description: Allow cleanup to delete orphaned DynamoDB table when DynamoDB deploy is disabled (DATA LOSS)
        required: false
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-dev-infra.yml'
      - '.github/workflows/deploy-infra.yml'

concurrency:
  group: deploy-dev-infra
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-infra:
    name: Deploy Infra to Dev
    uses: ./.github/workflows/deploy-infra.yml
    with:
      environment: dev
      github_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.github_branch || github.ref_name }}
      # Cleanup runs if enabled (default true)
      cleanup_orphaned_resources: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.cleanup_orphaned_resources == 'true' }}
      # Remove orphaned DynamoDB only if cleanup is enabled, DynamoDB is NOT being deployed, and explicit permission is given
      remove_orphaned_dynamodb: ${{ github.event.inputs.cleanup_orphaned_resources == 'true' && github.event.inputs.deploy_dynamodb != 'true' && github.event.inputs.remove_orphaned_dynamodb == 'true' }}
      # Service toggles: default true on push; respect explicit input on workflow_dispatch
      enable_dynamodb: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_dynamodb == 'true' }}
      enable_lambda: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_lambda == 'true' }}
      enable_api_gateway: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_api_gateway == 'true' }}
      enable_amplify: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_amplify == 'true' }}
      enable_iam: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_iam == 'true' }}
      enable_cognito: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_cognito == 'true' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DEPLOY_AWS_REGION: ${{ secrets.DEPLOY_AWS_REGION }}
      AMPLIFY_GITHUB_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}

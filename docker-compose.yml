# Named network so LocalStack can place Lambda containers on it
# and Lambda functions can reach LocalStack via the "localstack" hostname.
networks:
  local:
    name: accommodations-local

services:
  localstack:
    image: localstack/localstack:latest
    container_name: accommodations-localstack
    networks:
      - local
    ports:
      - '14566:4566'   # LocalStack gateway (all services)
    environment:
      - SERVICES=dynamodb,apigateway,lambda,iam,s3
      - DEBUG=1
      # Put Lambda execution containers on the same Docker network so they
      # can resolve the "localstack" hostname (used for DYNAMODB_ENDPOINT).
      - LAMBDA_DOCKER_NETWORK=accommodations-local
      # Set LOCALSTACK_AUTH_TOKEN in your shell or CI environment (required for LocalStack Pro).
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot service: builds the Lambda, deploys every AWS resource to
  # LocalStack, and writes the API URL to frontend/.env.local so that
  # the frontend service starts with the correct BACKEND_API_URL.
  deploy:
    build:
      context: .
      dockerfile: scripts/Dockerfile.deploy
    container_name: accommodations-deploy
    networks:
      - local
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_ENDPOINT=http://localstack:4566
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./scripts:/app/scripts

  # Next.js dev server — starts after the deploy service has written
  # frontend/.env.local with the correct BACKEND_API_URL.
  frontend:
    image: node:20-alpine
    container_name: accommodations-frontend
    working_dir: /app
    networks:
      - local
    depends_on:
      deploy:
        condition: service_completed_successfully
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      # Isolate node_modules inside the container so host installs don't interfere.
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

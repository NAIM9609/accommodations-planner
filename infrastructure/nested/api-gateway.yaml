AWSTemplateFormatVersion: "2010-09-09"
Description: API Gateway HTTP API with Lambda integrations

Parameters:
  Prefix:
    Type: String
    Description: Resource name prefix (app-name-environment)
  Environment:
    Type: String
    Description: Deployment environment
    AllowedValues: [dev, prod]
  HealthLambdaArn:
    Type: String
    Description: ARN of the health Lambda function
  HealthLambdaName:
    Type: String
    Description: Name of the health Lambda function
  ReservationsLambdaArn:
    Type: String
    Description: ARN of the reservations Lambda function
  ReservationsLambdaName:
    Type: String
    Description: Name of the reservations Lambda function
  ThrottleRateLimit:
    Type: Number
    Default: 5
    Description: Steady-state rate limit (requests/second)
  ThrottleBurstLimit:
    Type: Number
    Default: 10
    Description: Burst limit
  CognitoUserPoolArn:
    Type: String
    Description: ARN of the Cognito User Pool used for JWT authorisation
  CognitoUserPoolClientId:
    Type: String
    Description: Cognito User Pool App Client ID used as the JWT audience

Resources:
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${Prefix}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  CognitoAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      Name: !Sub "${Prefix}-cognito-jwt"
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        # Issuer is https://cognito-idp.<region>.amazonaws.com/<userPoolId>
        Issuer: !Sub
          - "https://cognito-idp.${Region}.amazonaws.com/${PoolId}"
          - Region: !Select [3, !Split [":", !Ref CognitoUserPoolArn]]
            PoolId: !Select [1, !Split ["/", !Select [5, !Split [":", !Ref CognitoUserPoolArn]]]]
        Audience:
          - !Ref CognitoUserPoolClientId

  HealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: "1.0"
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HealthLambdaArn}/invocations"

  ReservationsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationMethod: POST
      PayloadFormatVersion: "1.0"
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReservationsLambdaArn}/invocations"

  # Health routes — public (no auth)
  HealthGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /health
      Target: !Sub "integrations/${HealthIntegration}"

  HealthOptionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: OPTIONS /health
      Target: !Sub "integrations/${HealthIntegration}"

  # Reservations collection routes — OPTIONS public, others JWT-protected
  ReservationsGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /reservations
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${ReservationsIntegration}"

  ReservationsPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /reservations
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${ReservationsIntegration}"

  ReservationsOptionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: OPTIONS /reservations
      Target: !Sub "integrations/${ReservationsIntegration}"

  # Reservations individual routes — OPTIONS public, others JWT-protected
  ReservationIdGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /reservations/{id}"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${ReservationsIntegration}"

  ReservationIdDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "DELETE /reservations/{id}"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer
      Target: !Sub "integrations/${ReservationsIntegration}"

  ReservationIdOptionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "OPTIONS /reservations/{id}"
      Target: !Sub "integrations/${ReservationsIntegration}"

  # Lambda permissions for API Gateway invocation
  HealthLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HealthLambdaName
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  ReservationsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReservationsLambdaName
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Environment
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingRateLimit: !Ref ThrottleRateLimit
        ThrottlingBurstLimit: !Ref ThrottleBurstLimit
        DetailedMetricsEnabled: false

Outputs:
  ApiUrl:
    Description: API Gateway invoke URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  ApiId:
    Description: API Gateway API ID
    Value: !Ref HttpApi
